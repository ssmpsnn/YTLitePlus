workflows:
  ytbuild:
    name: YTLitePlus Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Clone submodules
        script: |
          git submodule update --init --recursive
      - name: Make build script executable
        script: |
          chmod +x build.sh
      - name: Run build script
        script: |
          ./build.sh
    artifacts:
      - packages/*.ipa
